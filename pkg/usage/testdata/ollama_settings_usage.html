<!doctype html>
<html>
  <body>
    <div class="flex flex-col space-y-6">
      <h2 class="text-xl font-medium flex items-center space-x-2">
        <span>Cloud Usage</span>
        <span class="text-xs font-normal px-2 py-0.5 rounded-full bg-neutral-100 text-neutral-600 capitalize">pro</span>
      </h2>

      <div>
        <div class="flex justify-between mb-2">
          <span class="text-sm">Session usage</span>
          <span class="text-sm">2% used</span>
        </div>
        <div class="text-xs text-neutral-500 mt-1 local-time" data-time="2026-03-28T00:00:00Z">
          Resets in 3 hours
        </div>
      </div>

      <div>
        <div class="flex justify-between mb-2">
          <span class="text-sm">Weekly usage</span>
          <span class="text-sm">26.5% used</span>
        </div>
        <div class="text-xs text-neutral-500 mt-1 local-time" data-time="2026-03-30T00:00:00Z">
          Resets in 2 days
        </div>
      </div>

      <form method="POST" action="/settings" class="pt-2">
        <label class="flex items-center gap-2 text-xs text-neutral-700">
          <input
            type="checkbox"
            name="notify-usage-limits"
            class="rounded border-neutral-300"
            checked
          />
          <span>Notify me when I'm close to hitting my usage limits</span>
        </label>
      </form>
    </div>
  </body>
</html>
